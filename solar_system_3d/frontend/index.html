<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }

    #status-badge {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; align-items: center; gap: 8px;

      display: flex; align-items: center; gap: 8px; width: 100%;

    /* ── Bottom collapsible container ────────────────────────────── */
    #bottom-container {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center;
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);

    #panel-tab {
      background: rgba(8,8,18,0.82); border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none; border-radius: 10px 10px 0 0;
      padding: 4px 20px; cursor: pointer; user-select: none;
      font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 6px; transition: color 0.18s;
      font-family: 'Orbitron', sans-serif;
    }
    #panel-tab:hover { color: rgba(255,255,255,0.75); }
    #panel-arrow { font-size: 8px; transition: transform 0.35s; }
    #bottom-container.collapsed #panel-arrow { transform: rotate(180deg); }

    #hint {
      font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.05em;
      pointer-events: none; white-space: nowrap; margin-bottom: 5px;
    }

    #control-bar {
      background: rgba(8,8,18,0.78); border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px); border-radius: 14px 14px 0 0; padding: 11px 22px;
      display: flex; align-items: center; gap: 18px; user-select: none; flex-wrap: wrap;
      width: max-content;
    }
    .ctrl-lbl { font-size: 10px; color: rgba(255,255,255,0.38); font-family: 'Orbitron', sans-serif; letter-spacing: 0.12em; white-space: nowrap; }
    #speed-slider {
      -webkit-appearance: none; appearance: none; width: 180px; height: 3px;
      background: rgba(255,255,255,0.15); border-radius: 4px; outline: none; cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #fff; box-shadow: 0 0 7px rgba(255,255,255,0.55); cursor: pointer;
    }
    #speed-val { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #fff; min-width: 110px; }
    .tog { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .tog input { cursor: pointer; accent-color: #aef; }
    .bar-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      border-radius: 7px; color: rgba(255,255,255,0.65); font-family: 'Inter', sans-serif;
      font-size: 11px; padding: 5px 11px; cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .bar-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .bar-btn.active-rt {
      background: rgba(80,200,255,0.15); border-color: rgba(80,200,255,0.45);
      color: #7df; box-shadow: 0 0 8px rgba(80,200,255,0.2);
    }
    .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="status-badge"><div id="status-dot"></div><span id="status-text">CONNECTING…</span></div>
<div id="day-counter">DAY&nbsp;&nbsp;<span id="day-val">0</span></div>
<!-- Real-time elapsed clock (only visible when real-time mode is ON) -->
<div id="real-clock" style="
  display:none; position:fixed; top:48px; left:20px; z-index:10;

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
// COORDINATE COMPRESSION
// Physics positions from Python are in AU (correct).
// We compress them visually so all planets are visible at once.
// Formula: displayR = AU^0.48 * 9   (sqrt-like, keeps relative order)
// ═══════════════════════════════════════════════════════════════
const COMPRESS_EXP  = 0.48;
const COMPRESS_SCALE = 9.0;

function auToDisplay(pyX, pyY, pyZ) {
  // pyX=radial dist, pyY=in-plane, pyZ=inclination height
  const r = Math.sqrt(pyX * pyX + pyY * pyY + pyZ * pyZ);
  if (r < 1e-6) return new THREE.Vector3(0, 0, 0);
  const rDisplay = Math.pow(r, COMPRESS_EXP) * COMPRESS_SCALE;
  const s = rDisplay / r;
  // Map Python axes → Three.js (orbital plane = XZ, height = Y)
  return new THREE.Vector3(pyX * s, pyZ * s, pyY * s);
}

// Precompute compressed radius for a given AU distance (for orbit rings)
function auToDisplayRadius(au) {
  return Math.pow(au, COMPRESS_EXP) * COMPRESS_SCALE;
}

// ═══════════════════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00000a);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 5000);
camera.position.set(0, 28, 65);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.rotateSpeed = 0.4;      // slower camera drag rotation
controls.zoomSpeed = 0.8;
controls.minDistance = 0.3;
controls.maxDistance = 1000;

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Lights ──────────────────────────────────────────────────────
const sunLight = new THREE.PointLight(0xfff5c0, 4.0, 600, 1.3);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x10102a, 2.2));

// ── Milky Way background sphere + sparkle stars ──────────────────
const texLoader = new THREE.TextureLoader();

// Background: real Milky Way photo wrapped on inner sphere
const bgTex = texLoader.load('/textures/stars.jpg');
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(800, 64, 32),
  new THREE.MeshBasicMaterial({ map: bgTex, side: THREE.BackSide })
));

// Extra bright sparkle points on top
(function() {
  const n = 1200, pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const r = 200 + Math.random() * 400;
    const t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r*Math.sin(p)*Math.cos(t); pos[i*3+1] = r*Math.sin(p)*Math.sin(t); pos[i*3+2] = r*Math.cos(p);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, sizeAttenuation: true, transparent: true, opacity: 0.6 })));
})();

// ═══════════════════════════════════════════════════════════════
// ORBIT RING REFERENCE CIRCLES
// Drawn once per planet at their initial AU radius.
// ═══════════════════════════════════════════════════════════════
// Initial AU distances from main.py
const ORBIT_AU = { Mercury:0.40, Venus:0.72, Earth:1.00, Mars:1.50, Jupiter:5.20, Saturn:9.50, Uranus:19.0, Neptune:30.06 };
const orbitRings = {};  // name → THREE.Line
let orbitRingsVisible = true;

function buildOrbitRing(name, color, auRadius) {
  const r = auToDisplayRadius(auRadius);
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.18 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  orbitRings[name] = line;
}

// ═══════════════════════════════════════════════════════════════
// PLANET OBJECTS
// ═══════════════════════════════════════════════════════════════
const planetObjects = {};
let trailsVisible = true;
const TRAIL_MAX = 350;

// Visual radii — larger than backend values so planets are clearly visible
const VISUAL_RADIUS = {
  Sun: 2.0, Mercury: 0.22, Venus: 0.30, Earth: 0.33,
  Mars: 0.26, Jupiter: 0.60, Saturn: 0.52, Uranus: 0.40, Neptune: 0.38
};

// Planet texture maps — served by FastAPI at /textures/
const PLANET_TEXTURES = {
  Sun:     '/textures/sun.jpg',
  Mercury: '/textures/mercury.jpg',
  Venus:   '/textures/venus.jpg',
  Earth:   '/textures/earth.jpg',
  Mars:    '/textures/mars.jpg',
  Jupiter: '/textures/jupiter.jpg',
  Saturn:  '/textures/saturn.jpg',
  Uranus:  '/textures/uranus.jpg',
  Neptune: '/textures/neptune.jpg',
};

// ── Sidereal rotation periods (days) — NASA GSFC Planetary Fact Sheets ──────
// Source: https://nssdc.gsfc.nasa.gov/planetary/factsheet/
// Dr. David R. Williams, NASA Goddard Space Flight Center
// Negative values = RETROGRADE rotation (spins opposite to orbital direction)
const ROTATION_PERIOD_DAYS = {
  Sun:      25.38,    // Differential rotation; 25.38d at equator
  Mercury:  58.646,   // Tidally influenced; 3:2 spin-orbit resonance with Sun
  Venus:   -243.025,  // RETROGRADE — slower than its own year (224.7d)!
  Earth:     0.99727, // 23h 56m 4s (sidereal day)
  Mars:      1.02596, // 24h 37m 22s — very close to Earth
  Jupiter:   0.41354, // 9h 55m — fastest rotation, causes visible oblate shape
  Saturn:    0.44401, // 10h 33m — second fastest
  Uranus:   -0.71833, // RETROGRADE — also tilted 97.8° (rolls on its side)
  Neptune:   0.67125, // 16h 6m
};

// Visual spin scale: how many radians Earth rotates per frame at speed=1 (1 day/frame).
// Chosen so Earth makes one visible rotation in ~2100 frames (~35s at 60fps).
const EARTH_SPIN_VISUAL = 0.003;  // rad/frame @ speed=1

function makePlanetMesh(pData) {
  const group = new THREE.Group();
  const r = VISUAL_RADIUS[pData.name] ?? pData.radius;

  // Load texture (Three.js shows placeholder colour until texture loads)
  const tex = PLANET_TEXTURES[pData.name]
    ? texLoader.load(PLANET_TEXTURES[pData.name])
    : null;

  let mat;
  if (pData.is_sun) {
    mat = new THREE.MeshStandardMaterial({
      map: tex,
      emissive: new THREE.Color(pData.color),
      emissiveIntensity: tex ? 0.6 : 2.0,
      emissiveMap: tex,
      roughness: 0.4,
    });
    // Outer corona glow
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(r * 1.55, 24, 24),
      new THREE.MeshBasicMaterial({ color: '#ff8800', transparent: true, opacity: 0.07, side: THREE.BackSide })
    ));
  } else {
    mat = new THREE.MeshStandardMaterial({
      map: tex,
      color: tex ? 0xffffff : new THREE.Color(pData.color),
      roughness: 0.85,
      metalness: 0.0,
    });
  }

  const sphereMesh = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), mat);
  group.add(sphereMesh);
  group.userData.sphereMesh = sphereMesh;   // for axial spin

  // ── Focus highlight sphere (pulses when focused) ──
  const hlMat = new THREE.MeshBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0, side: THREE.BackSide });
  const hlMesh = new THREE.Mesh(new THREE.SphereGeometry(r * 2.0, 24, 24), hlMat);
  group.add(hlMesh);
  group.userData.hlMesh = hlMesh;

  // Saturn rings with real ring texture
  if (pData.has_ring) {
    const ringTex = texLoader.load('/textures/saturn_ring.png');
    const rg = new THREE.RingGeometry(r * 1.45, r * 2.55, 80);
    // Fix UVs so ring texture maps radially (inner → outer)
    const uvs = rg.attributes.uv;
    const pos = rg.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), z = pos.getZ(i);
      const dist = Math.sqrt(x*x + z*z);
      const t = (dist - r * 1.45) / (r * 2.55 - r * 1.45);
      uvs.setXY(i, t, 0.5);
    }
    const rm = new THREE.MeshBasicMaterial({ map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI / 2.2;
    group.add(ring);
  }
  return group;
}

function makeTrailLine(color) {
  return new THREE.Line(
    new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.4 })
  );
}

function ensurePlanet(pData) {
  if (planetObjects[pData.name]) return;
  const group = makePlanetMesh(pData);
  const trailLine = makeTrailLine(pData.color);
  scene.add(group);
  scene.add(trailLine);
  planetObjects[pData.name] = { group, trailLine, trailPoints: [], latest: pData };
  buildPlanetUI(pData);
  // Build orbit ring for non-sun planets
  if (!pData.is_sun && ORBIT_AU[pData.name]) {
    buildOrbitRing(pData.name, pData.color, ORBIT_AU[pData.name]);
  }
}

function updateTrail(name, trailPts) {
  const obj = planetObjects[name];
  if (!obj || !trailPts || trailPts.length === 0) return;
  // trailPts is an array of [pyX, pyY, pyZ] — all intermediate positions this frame
  for (const [tx, ty, tz] of trailPts) {
    obj.trailPoints.push(auToDisplay(tx, ty, tz));
  }
  if (obj.trailPoints.length > TRAIL_MAX) {
    obj.trailPoints.splice(0, obj.trailPoints.length - TRAIL_MAX);
  }
  if (obj.trailPoints.length >= 2) obj.trailLine.geometry.setFromPoints(obj.trailPoints);
  obj.trailLine.visible = trailsVisible;
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════
const statusDot      = document.getElementById('status-dot');
const statusText     = document.getElementById('status-text');
const dayVal         = document.getElementById('day-val');
const realClockEl    = document.getElementById('real-clock');
const realClockVal   = document.getElementById('real-clock-val');
let ws, wsReady = false;
let isPaused = false;

function sendToServer(obj) {
  if (ws && wsReady) ws.send(JSON.stringify(obj));
}

// Format seconds → hh:mm:ss
function formatRealTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function connectWS() {
  // Use wss:// on HTTPS (Railway/production) and ws:// on HTTP (localhost)
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${window.location.host}/ws`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    wsReady = true;
    statusDot.classList.add('connected');
    statusText.textContent = 'CONNECTED';
    sendToServer({ speed: +speedSlider.value });
  };
  ws.onclose = () => {
    wsReady = false;
    statusDot.classList.remove('connected');
    statusText.textContent = 'RECONNECTING…';
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => { statusText.textContent = 'SERVER OFFLINE'; };
  ws.onmessage = (ev) => {
    const payload = JSON.parse(ev.data);
    dayVal.textContent = payload.day.toLocaleString();
    // Show real-time clock when realtime mode is active
    if (isRealtime && payload.real_seconds !== undefined) {
      realClockVal.textContent = formatRealTime(payload.real_seconds);
    }
    for (const p of payload.planets) {
      ensurePlanet(p);
      const obj = planetObjects[p.name];
      obj.latest = p;
      const dp = auToDisplay(p.x, p.y, p.z);
      obj.group.position.copy(dp);
      if (p.is_sun) sunLight.position.copy(dp);
      if (!p.is_sun) updateTrail(p.name, p.trail);
      if (focusedPlanet === p.name) renderInfoCard(p);
    }
  };
}
connectWS();

// ═══════════════════════════════════════════════════════════════
// PANEL COLLAPSE
// ═══════════════════════════════════════════════════════════════
let panelCollapsed = false;
function togglePanel() {
  panelCollapsed = !panelCollapsed;
  document.getElementById('bottom-container').classList.toggle('collapsed', panelCollapsed);
  document.getElementById('panel-arrow').textContent = panelCollapsed ? '\u25BC' : '\u25B2';
}
// Fix: attach via addEventListener (onclick in HTML can't reach module-scope functions)
document.getElementById('panel-tab').addEventListener('click', togglePanel);

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
const speedSlider = document.getElementById('speed-slider');
const speedValEl  = document.getElementById('speed-val');

function sendSpeed(v) { sendToServer({ speed: v }); }

speedSlider.addEventListener('input', () => {
  const v = +speedSlider.value;
  speedValEl.textContent = v === 1 ? '1 day / frame' : `${v} days / frame`;
  sendSpeed(v);
});

// ── Pause button
const pauseBtn = document.getElementById('pause-btn');
pauseBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  pauseBtn.innerHTML = isPaused ? '&#9654; Resume' : '&#9646;&#9646; Pause';
  pauseBtn.style.background = isPaused ? 'rgba(100,200,100,0.15)' : '';
  pauseBtn.style.borderColor = isPaused ? 'rgba(100,200,100,0.4)' : '';
  pauseBtn.style.color = isPaused ? '#8f8' : '';
  sendToServer({ paused: isPaused });
});

// ── Real Time button ─────────────────────────────────────────────
// True 1:1 real time: 1 real second = 1 physics second.
// Planets barely move but the elapsed real-time clock ticks every second.
let isRealtime = false;
const realtimeBtn = document.getElementById('realtime-btn');
realtimeBtn.addEventListener('click', () => {
  isRealtime = !isRealtime;
  realtimeBtn.classList.toggle('active-rt', isRealtime);
  realtimeBtn.innerHTML = isRealtime ? '&#128336; Real Time ON' : '&#128336; Real Time';
  speedSlider.disabled = isRealtime;
  speedSlider.style.opacity = isRealtime ? '0.35' : '1';
  speedValEl.textContent = isRealtime
    ? 'true 1:1 real time'
    : (+speedSlider.value === 1 ? '1 day / frame' : `${speedSlider.value} days / frame`);
  // Show / hide the real-time elapsed clock
  realClockEl.style.display = isRealtime ? 'block' : 'none';
  if (isRealtime) realClockVal.textContent = '00:00:00';
  sendToServer({ realtime: isRealtime });
});

document.getElementById('trail-check').addEventListener('change', e => {
  trailsVisible = e.target.checked;
  for (const obj of Object.values(planetObjects)) {
    if (!obj.latest.is_sun) obj.trailLine.visible = trailsVisible;
  }
});

document.getElementById('orbit-check').addEventListener('change', e => {
  orbitRingsVisible = e.target.checked;
  for (const line of Object.values(orbitRings)) line.visible = orbitRingsVisible;
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!ws || !wsReady) return;
  sendToServer({ reset: true });
  // Clear pause state
  isPaused = false;
  pauseBtn.innerHTML = '&#9646;&#9646; Pause';
  pauseBtn.style.background = pauseBtn.style.borderColor = pauseBtn.style.color = '';
  // Clear realtime state
  isRealtime = false;
  realtimeBtn.classList.remove('active-rt');
  realtimeBtn.innerHTML = '&#128336; Real Time';
  speedSlider.disabled = false; speedSlider.style.opacity = '1';
  const v = +speedSlider.value;
  speedValEl.textContent = v === 1 ? '1 day / frame' : `${v} days / frame`;
  // Clear trails
  for (const obj of Object.values(planetObjects)) {
    obj.trailPoints = [];
    obj.trailLine.geometry.setFromPoints([]);
  }
  dayVal.textContent = '0';
});

document.getElementById('view-all-btn').addEventListener('click', () => {
  focusedPlanet = null;
  document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('info-card').style.display = 'none';
  // Fly to overview
  flyTo(new THREE.Vector3(0, 28, 65), new THREE.Vector3(0, 0, 0), false);
});

// ═══════════════════════════════════════════════════════════════
// PLANET LIST UI
// ═══════════════════════════════════════════════════════════════
let focusedPlanet = null;

function buildPlanetUI(pData) {
  const list = document.getElementById('planet-list');
  const btn = document.createElement('button');
  btn.className = 'planet-btn';
  btn.id = `btn-${pData.name}`;
  btn.innerHTML = `<span class="pdot" style="background:${pData.color}"></span>${pData.name}`;
  btn.addEventListener('click', () => teleportToPlanet(pData.name));
  list.appendChild(btn);
}

// INSTANT TELEPORT (no lerp — jumps immediately to planet)
function teleportToPlanet(name) {
  // Toggle deselect
  if (focusedPlanet === name) {
    clearHighlight(focusedPlanet);
    focusedPlanet = null;
    document.getElementById(`btn-${name}`)?.classList.remove('active');
    document.getElementById('info-card').style.display = 'none';
    return;
  }
  // Clear old highlight
  if (focusedPlanet) {
    clearHighlight(focusedPlanet);
    document.getElementById(`btn-${focusedPlanet}`)?.classList.remove('active');
  }
  focusedPlanet = name;
  document.getElementById(`btn-${name}`)?.classList.add('active');
  document.getElementById('info-card').style.display = 'block';

  const obj = planetObjects[name];
  if (!obj) return;
  const target = obj.group.position.clone();
  const r = VISUAL_RADIUS[name] ?? obj.latest.radius;
  const dist = obj.latest.is_sun ? 14 : Math.max(2.5, r * 9 + 2);
  // INSTANT: set camera directly, no lerp
  camera.position.set(target.x + dist, target.y + dist * 0.5, target.z + dist);
  controls.target.copy(target);
  controls.update();
  flyTarget = null;   // cancel any in-progress fly
  renderInfoCard(obj.latest);
}

function clearHighlight(name) {
  const obj = planetObjects[name];
  if (!obj) return;
  const hl = obj.group.userData.hlMesh;
  if (hl) hl.material.opacity = 0;
}

// SMOOTH FLY-TO helper (used by View All and 3D-click)
let flyTarget = null;
function flyTo(destPos, destLook, smooth = true) {
  if (!smooth) {
    camera.position.copy(destPos);
    controls.target.copy(destLook);
    controls.update();
    flyTarget = null;
  } else {
    flyTarget = { pos: destPos, look: destLook };
  }
}

function renderInfoCard(p) {
  document.getElementById('ic-name').textContent = p.name;
  document.getElementById('ic-body').innerHTML = p.is_sun
    ? '<strong>The star at the center of our solar system.</strong>'
    : `<strong>Distance from Sun:</strong><br>${p.dist_sun_km.toLocaleString()} km`;
}

// ═══════════════════════════════════════════════════════════════
// RAYCASTING — click on 3D planet sphere to focus (smooth fly)
// ═══════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseDownPos = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', e => { mouseDownPos = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('click', e => {
  // Ignore drags
  if (Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y) > 5) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  for (const [name, obj] of Object.entries(planetObjects)) {
    obj.group.traverse(c => { if (c.isMesh) meshes.push({ m: c, name }); });
  }
  const hits = raycaster.intersectObjects(meshes.map(x => x.m));
  if (hits.length) {
    const nm = meshes.find(x => x.m === hits[0].object)?.name;
    if (nm) teleportToPlanet(nm);
  }
});

// ═══════════════════════════════════════════════════════════════
// WASD KEYBOARD FLIGHT CONTROLS
// W/S  — fly forward/backward along camera look direction
// A/D  — strafe left/right
// Q/E  — fly up/down
// Speed is adaptive: scales with camera distance so it feels
// natural whether zoomed in close or pulled back to see Neptune.
// ═══════════════════════════════════════════════════════════════
const keysDown = new Set();

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;   // don't grab typing focus
  keysDown.add(e.code);
  // Prevent spacebar from scrolling the page
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => keysDown.delete(e.code));

function applyKeyboardMovement() {
  if (keysDown.size === 0) return;

  // Adaptive speed: further away = move faster, close up = slow & precise
  const dist  = camera.position.distanceTo(controls.target);
  const speed = Math.max(0.02, dist * 0.018);

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);           // where camera is looking

  const right = new THREE.Vector3();
  right.crossVectors(forward, camera.up).normalize();

  const up = new THREE.Vector3(0, 1, 0);

  const move = new THREE.Vector3();
  if (keysDown.has('KeyW'))                  move.addScaledVector(forward,  speed);
  if (keysDown.has('KeyS'))                  move.addScaledVector(forward, -speed);
  if (keysDown.has('KeyA'))                  move.addScaledVector(right,   -speed);
  if (keysDown.has('KeyD'))                  move.addScaledVector(right,    speed);
  if (keysDown.has('KeyQ') || keysDown.has('Space')) move.addScaledVector(up,  speed);
  if (keysDown.has('KeyE') || keysDown.has('ShiftLeft')) move.addScaledVector(up, -speed);

  if (move.lengthSq() === 0) return;

  // Move camera AND target together — keeps the orbit pivot with you
  camera.position.add(move);
  controls.target.add(move);
  flyTarget = null;   // cancel any in-progress smooth fly
}

// ═══════════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const now = Date.now() / 1000;
  // WASD keyboard flight
  applyKeyboardMovement();
  // Smooth fly-to (used by View All only)
  if (flyTarget) {
    camera.position.lerp(flyTarget.pos, 0.05);
    controls.target.lerp(flyTarget.look, 0.05);
    if (camera.position.distanceTo(flyTarget.pos) < 0.15) flyTarget = null;
  }
  // ── Axial spin (NASA sidereal rotation periods, speed-coupled) ──────────
  // spin_per_frame = (EARTH_SPIN_VISUAL / period_days) * simDaysPerFrame
  // → faster simulation = planets spin proportionally faster (physically correct)
  // → negative period = retrograde (Venus, Uranus spin backwards)
  const simDaysPerFrame = isRealtime
    ? (1 / 86400)            // real-time: 1/86400 of a day per frame
    : +speedSlider.value;    // normal: speed slider value
  for (const [name, obj] of Object.entries(planetObjects)) {
    const sm = obj.group.userData.sphereMesh;
    const period = ROTATION_PERIOD_DAYS[name];
    if (sm && period !== undefined) {
      // sign of period encodes direction; magnitude gives speed ratio
      sm.rotation.y += (EARTH_SPIN_VISUAL / period) * simDaysPerFrame;
    }
  }
  // Pulse highlight
  if (focusedPlanet && planetObjects[focusedPlanet]) {
    const hl = planetObjects[focusedPlanet].group.userData.hlMesh;
    if (hl) hl.material.opacity = 0.12 + 0.23 * (0.5 + 0.5 * Math.sin(now * 3.5));
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
